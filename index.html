<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 第三只眼 - MiniCPM-o 4.5 实时视觉助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #00d4ff;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        
        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }
        
        .video-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        
        .status-badge {
            padding: 6px 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #00ff88;
        }
        
        .status-dot.speaking {
            background: #00d4ff;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-section {
            width: 380px;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .ai-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
        
        .ai-info {
            flex: 1;
        }
        
        .ai-name {
            font-weight: 600;
            color: #00d4ff;
        }
        
        .ai-status {
            font-size: 12px;
            color: #888;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            background: rgba(0,212,255,0.2);
            border: 1px solid rgba(0,212,255,0.3);
            align-self: flex-start;
        }
        
        .message.user {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            align-self: flex-end;
        }
        
        .message.system {
            background: rgba(255,165,0,0.2);
            border: 1px solid rgba(255,165,0,0.3);
            align-self: center;
            text-align: center;
            font-size: 12px;
        }
        
        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e8e8e8;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #ff6666);
            color: white;
        }
        
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .mode-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mode-btn.active {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 30px;
            padding: 5px 0;
        }
        
        .bar {
            width: 4px;
            height: 20px;
            background: #00d4ff;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
        
        /* Settings panel */
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26,26,46,0.98);
            border-radius: 12px;
            padding: 25px;
            width: 450px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 100;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .settings-panel.show {
            display: block;
        }
        
        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .setting-item {
            margin-bottom: 15px;
        }
        
        .setting-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .setting-input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 14px;
        }
        
        .setting-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            display: none;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,212,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            color: #00d4ff;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            
            .chat-section {
                width: 100%;
                max-height: 300px;
            }
            
            .video-section {
                min-height: 300px;
            }
        }
        
        /* Mobile optimized */
        @media (max-width: 600px) {
            .app-container {
                padding: 10px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .subtitle {
                font-size: 12px;
            }
            
            .chat-section {
                width: 100%;
                max-height: 250px;
            }
            
            .control-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .mode-selector {
                flex-wrap: wrap;
            }
            
            .mode-btn {
                flex: 1;
                min-width: 80px;
            }
            
            .settings-panel {
                width: 90%;
                max-height: 80vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🦐 AI 第三只眼</h1>
            <p class="subtitle">MiniCPM-o 4.5 实时视觉助手 · 边看边听边说 · <span id="versionBadge" style="color:#00ff88">v1.0.3</span></p>
        </header>
        
        <div class="main-content">
            <div class="video-section">
                <div class="video-container">
                    <div class="video-overlay">
                        <div class="status-badge">
                            <span class="status-dot" id="connectionDot"></span>
                            <span id="connectionStatus">未连接</span>
                        </div>
                        <div class="status-badge">
                            <span id="sessionInfo">--</span>
                        </div>
                    </div>
                    
                    <video id="localVideo" autoplay playsinline muted></video>
                    
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="loading-spinner"></div>
                        <p class="loading-text">正在连接 AI...</p>
                    </div>
                </div>
                
                <div class="visualizer" id="audioVisualizer">
                    <!-- Audio visualization bars will be added dynamically -->
                </div>
            </div>
            
            <div class="chat-section">
                <div class="chat-header">
                    <div class="ai-avatar">🤖</div>
                    <div class="ai-info">
                        <div class="ai-name">小鹿 AI</div>
                        <div class="ai-status" id="aiStatus">等待连接...</div>
                    </div>
                    <button class="btn btn-secondary" id="settingsBtn" style="padding:8px 12px;font-size:12px;">
                        ⚙️ 设置
                    </button>
                </div>
                
                <div class="messages-container" id="messagesContainer">
                    <div class="message system">
                        <p>👋 点击「开始对话」开启 AI 第三只眼</p>
                        <p class="message-time">系统提示</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="video">📹 视频双工</button>
                <button class="mode-btn" data-mode="audio">🎙 音频双工</button>
            </div>
            
            <div class="control-buttons">
                <button class="btn btn-primary" id="startBtn">▶️ 开始对话</button>
                <button class="btn btn-secondary" id="muteBtn" style="display:none;">🔇 静音</button>
                <button class="btn btn-secondary" id="interruptBtn" style="display:none;">⏸️ 打断</button>
                <button class="btn btn-secondary" id="screenshotBtn" style="display:none;">📸 截图</button>
                <button class="btn btn-danger" id="stopBtn" style="display:none;">⏹️ 结束对话</button>
            </div>
        </div>
    </div>
    
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">⚙️ 设置</div>
        <p style="color:#888;font-size:12px;margin-bottom:15px">快捷键: 空格=开始/结束 | S=截图 | Esc=关闭设置</p>
        
        <div class="setting-item">
            <div class="setting-label">🎭 选择 AI 人设</div>
            <div id="personalityGrid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px;">
                <!-- Personalities will be loaded dynamically -->
            </div>
            <button class="btn btn-secondary" id="randomPersonalityBtn" style="width: 100%; margin-top: 10px; padding: 10px;">
                🎲 随机选择
            </button>
        </div>
        
        <div class="setting-item">
            <div class="setting-label">AI 人设提示词</div>
            <textarea class="setting-input" id="systemPrompt" rows="3">你是一个名叫"小鹿"的可爱 AI 助手，性格活泼、好奇心强。你会实时观察摄像头画面，主动描述看到的有趣事物，发现安全隐患会提醒用户。用简短俏皮的语言说话，偶尔会开点小玩笑。看到可爱的事物会表现出惊喜。</textarea>
        </div>
        
        <div class="setting-item">
            <div class="setting-label">API 端点</div>
            <input class="setting-input" id="apiEndpoint" value="wss://minicpmo45.modelbest.cn/v1/realtime">
        </div>
        
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn btn-primary" id="saveSettings">保存</button>
            <button class="btn btn-secondary" id="closeSettings">取消</button>
        </div>
    </div>
    
    <!-- Core Scripts -->
    <script src="personalities.js"></script>
    <script src="app.js"></script>
</body>
</html>
